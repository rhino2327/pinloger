<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PINLOGER 휴대폰 인증</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    p { color: #aaa; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #0f3460;
      border-top-color: #e94560; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.4);
      color: #e94560; border-radius: 10px; padding: 14px; font-size: 13px;
      max-width: 300px; margin-top: 12px; display: none;
    }
    #recaptcha-container { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="logo">📱</div>
  <h1>휴대폰 인증</h1>
  <p>인증 코드를 발송하는 중입니다.<br />잠시만 기다려 주세요.</p>
  <div class="spinner" id="spinner"></div>
  <div class="error" id="error-box"></div>
  <div id="recaptcha-container"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js';
    import {
      getAuth, signInWithPhoneNumber, RecaptchaVerifier
    } from 'https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDrWmsoYUR3eqIUQQ2vGwCVTPxTswZxF7M",
      authDomain: "travel-app-a2ee5.firebaseapp.com",
      projectId: "travel-app-a2ee5",
      storageBucket: "travel-app-a2ee5.firebasestorage.app",
      messagingSenderId: "1007853624616",
      appId: "1:1007853624616:web:eb6a4971a747dcea3ac41d",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const phone = params.get('phone');
    const redirectScheme = params.get('redirect') || 'pinloger://phone-verify-callback';

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      // 3초 후 앱으로 돌아감
      setTimeout(() => {
        window.location.href = `${redirectScheme}?error=${encodeURIComponent(msg)}`;
      }, 3000);
    }

    if (!phone) {
      showError('전화번호가 없습니다. 앱으로 돌아가 다시 시도해주세요.');
    } else {
      try {
        const verifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
          size: 'invisible',
          callback: () => {}
        });

        await verifier.render();

        const confirmationResult = await signInWithPhoneNumber(auth, phone, verifier);
        const verificationId = confirmationResult.verificationId;

        // 성공 — 앱으로 verificationId 전달
        window.location.href = `${redirectScheme}?verificationId=${encodeURIComponent(verificationId)}`;
      } catch (err) {
        const msg = err.code === 'auth/invalid-phone-number'
          ? '올바른 전화번호 형식이 아닙니다.'
          : err.code === 'auth/too-many-requests'
          ? '요청이 너무 많습니다. 잠시 후 다시 시도해주세요.'
          : err.message || 'SMS 발송에 실패했어요.';
        showError(msg);
      }
    }
  </script>
</body>
</html>
